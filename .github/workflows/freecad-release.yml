name: CAD Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Attach CAD exports to GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Check exported CAD files
        run: |
          test -d exports
          find exports -type f \( -name '*.step' -o -name '*.stp' -o -name '*.stl' -o -name '*.3mf' \) | grep .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: seven-cad-exports
          path: |
            exports/**/*.step
            exports/**/*.stp
            exports/**/*.stl
            exports/**/*.3mf
          if-no-files-found: error

      - name: Attach exports to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            find exports -type f \( -name '*.step' -o -name '*.stp' -o -name '*.stl' -o -name '*.3mf' \) -print0 | xargs -0 gh release upload "$TAG_NAME" --clobber
          else
            find exports -type f \( -name '*.step' -o -name '*.stp' -o -name '*.stl' -o -name '*.3mf' \) -print0 | xargs -0 gh release create "$TAG_NAME" --title "$TAG_NAME"
          fi
